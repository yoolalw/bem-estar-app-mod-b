<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-estar</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gradient-to-r from-[#f7f7f7] to-[#aed6f1]">
    <div class="justify-center align-middle items-center m-auto flex flex-col">
        <img src="img/logomarca.png" class="h-[200px] mt-20">
        <div
            class="container-log h-[500px] bg-[#f7f7f7] shadow-xl w-[400px] border-2 border-[#333] mt-10 rounded-xl justify-center align-middle flex flex-col items-center">
            <label class="font-bold text-[15px] text-[#333]">Insira seu nome de usuário</label>
            <input type="text" id="username" placeholder="username123"
                class="w-[280px] shadow-xl text-center h-[60px] border-[#aed6f1] border-2 rounded-full">
            <label class="font-bold text-[15px] text-[#333] mt-8">Insira sua senha</label>
            <input type="password" id="password"
                class="w-[280px]  h-[60px] border-[#aed6f1] border-2  text-center rounded-full">
            <button type="submit" id="submit"
                class="w-[250px] h-[60px] border-2 mt-8 shadow-xl border-[#a2ded0] rounded-full bg-gradient-to-r from-[#a2ded0] to-[#aed6f1] cursor-pointer text-[#333] bold text-[20px] font-bold italic">Entrar</button>
        </div>
    </div>

</body>

</html>
