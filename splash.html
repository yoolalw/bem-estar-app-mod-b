<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bem-Estar</title>
    <style>
        @keyframes progress-animate {
            0% {
                width: 0%;
            }

            100% {
                width: 100%;
            }
        }

        .animate-progress {
            animation: forwards 3s progress-animate;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-[#f7f7f7]">
    <div class="justify-center flex flex-col align-middle items-center m-auto">
        <img src="img/logomarca.png" class="mt-30">
        <div class="w-[900px] rounded-full h-10 mt-9 overflow-hidden shadow-xl bg-[#aed6f1]">
            <div class="bar h-full animate-progress bg-[#ededed]"></div>
        </div>
    </div>

    <script src="js/splash.js"></script>
</body>

</html>
